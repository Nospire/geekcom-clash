name: Build

on:
  push:
    tags-ignore:
      - nightly
    branches:
      - main
      - dev
      - nightly
  pull_request:

permissions:
  contents: write

jobs:
  build_plugin:
    name: Build Plugin
    # ubuntu-22.04 (glibc 2.35) НАМЕРЕННО: GUI с CGO динамически линкует glibc;
    # на ubuntu-latest (2.39) бинарь не запустится на SteamOS Деки (glibc ~2.36).
    # 2.35 ≤ Деки → запускается. Движок CGO=0 (статика) — ему всё равно.
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm

      - name: Replacing version field with release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${{github.ref_name}}
          VERSION=${VERSION#v}
          sed -i "s/{{DECKY_CLASH_VERSION}}/${VERSION}/g" package.json

      - name: Replacing version field with commit hex
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          HASH=$(git rev-parse HEAD)
          DATE=$(date -u +'%y%m%d')
          VERSION=nightly-${DATE}-${HASH:0:7}
          sed -i "s/{{DECKY_CLASH_VERSION}}/${VERSION}/g" package.json

      - name: Install package and build
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install GUI build deps (OpenGL/X11 для Fyne CGO)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Build desktop engine + GUI
        run: |
          cd desktop
          # Движок — чистый Go (статика, без glibc-зависимости)
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w" -o geekcom-clash ./cmd/geekcom-clash
          # GUI (Fyne) — нужен CGO + GL/X11; нативная сборка под linux/amd64
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags="-s -w" -o geekcom-clash-gui ./cmd/geekcom-clash-gui

      - name: Collect files
        run: |
          mkdir -p release/GeekcomClash
          cp -R defaults/* dist py_modules release/GeekcomClash/
          rm -rf release/GeekcomClash/defaults/external/.git
          cp main.py plugin.json package.json LICENSE release/GeekcomClash/
          mkdir -p release/GeekcomClash/desktop
          # NIGHTLY-набор: Go-движок + Fyne-GUI + наш deploy-скрипт и ассеты
          cp desktop/deploy-desktop.sh desktop/49-geekcom-clash.rules desktop/logo.png release/GeekcomClash/desktop/
          cp desktop/geekcom-clash desktop/geekcom-clash-gui release/GeekcomClash/desktop/
          chmod +x release/GeekcomClash/desktop/geekcom-clash release/GeekcomClash/desktop/geekcom-clash-gui release/GeekcomClash/desktop/deploy-desktop.sh
          cd release
          zip -r GeekcomClash.zip GeekcomClash
          cd ..

      - name: Packing offine installer
        run: |
          OVERRIDE_PLUGIN_DIR="release/GeekcomClash" OVERRIDE_DATA_DIR="release/GeekcomClash/data" ./install.sh --yes --no-privilege --without-plugin --without-restart --without-desktop
          cp install-offline.sh release/Installer-GeekcomClash.sh
          cd release
          zip -r GeekcomClash-full.zip GeekcomClash
          cat GeekcomClash-full.zip >> Installer-GeekcomClash.sh
          cd ..

      - name: Publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deckyclash-artifacts
          path: |
            ./release/GeekcomClash.zip
            ./release/GeekcomClash-full.zip
            ./release/Installer-GeekcomClash.sh
          if-no-files-found: error

  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build_plugin
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Publish to Github release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/deckyclash-artifacts/*
          name: Release ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'pre') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nightly:
    name: Publish nightly
    if: ${{ github.ref == 'refs/heads/nightly' || github.ref == 'refs/heads/dev' }}
    runs-on: ubuntu-latest
    needs: build_plugin
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Move nightly tag to current commit
        run: |
          git tag -f nightly "$GITHUB_SHA"
          # явный refs/tags/: иначе при ветке с именем nightly push неоднозначен
          # (src refspec nightly matches more than one)
          git push origin -f refs/tags/nightly

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Publish to Github release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/deckyclash-artifacts/*
          name: Release Nightly
          prerelease: true
          tag_name: nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
